name: auto-sign

on:
  schedule:
    - cron: "0 23 * * *" # 北京时间 7:00
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          pip install requests playwright
          playwright install firefox

      - name: run sign script
        env:
          OPEN_ID: ${{ secrets.OPEN_ID }}
          LOCATION_POINT: ${{ secrets.LOCATION_POINT }}
          LOCATION_ADDRESS: ${{ secrets.LOCATION_ADDRESS }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_URL: ${{ secrets.PUSHPLUS_URL }}
        run: |
          python sign.py
